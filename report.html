<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BioScan Wellness Report</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="report-toolbar no-print">
    <div class="toolbar-content">
      <div class="toolbar-left">
        <h2 id="toolbarClientName">Report</h2>
        <p id="toolbarDate" class="toolbar-meta"></p>
      </div>
      <div class="toolbar-right">
        <span id="toolbarLanguage" class="toolbar-language"></span>
      </div>
    </div>
  </div>

  <div id="reportContainer"></div>

  <div class="report-footer no-print">
    <button class="btn-secondary" onclick="window.print()">Download PDF</button>
    <button class="btn-tertiary" onclick="clearAndReturnHome()">Create Another Report</button>
  </div>

  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      loadReport();
    });

    function loadReport() {
      const clientName = sessionStorage.getItem('clientName') || 'Client';
      const language = sessionStorage.getItem('language') || 'en';
      const reportLink = sessionStorage.getItem('reportLink');
      const reportDate = new Date().toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });

      document.getElementById('toolbarClientName').textContent = clientName;
      document.getElementById('toolbarDate').textContent = reportDate;

      const langNames = {
        en: 'English',
        es: 'Spanish',
        hu: 'Hungarian',
        ru: 'Russian'
      };
      document.getElementById('toolbarLanguage').textContent = langNames[language] || 'English';

      // Load report from the client-provided link
      if (!reportLink) {
        document.getElementById('reportContainer').innerHTML = '<p>Error: No report link provided. Please go back and submit the form.</p>';
        return;
      }

      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 10000);

      fetch(reportLink, { signal: controller.signal })
        .then(response => {
          clearTimeout(timeoutId);
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
          }
          return response.text();
        })
        .then(html => {
          if (!html || html.trim().length === 0) {
            throw new Error('Empty response from report link');
          }
          document.getElementById('reportContainer').innerHTML = html;
        })
        .catch(error => {
          clearTimeout(timeoutId);
          console.error('Report fetch error:', error);
          let errorMsg = 'Error loading report from the provided link.';
          if (error.name === 'AbortError') {
            errorMsg = 'Request timed out. The link may be invalid or unreachable.';
          } else if (error.message.includes('HTTP')) {
            errorMsg = `Server error: ${error.message}`;
          } else if (error.message.includes('fetch')) {
            errorMsg = 'CORS error or invalid URL. Please verify the report link is publicly accessible.';
          }
          document.getElementById('reportContainer').innerHTML = `<div style="padding:20px;text-align:center;color:#d32f2f;"><p><strong>Error:</strong> ${errorMsg}</p><p style="font-size:12px;color:#666;margin-top:10px;">Link: ${reportLink}</p></div>`;
        });
    }
  </script>
</body>
</html>
