<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BioScan Wellness Report</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="report-toolbar no-print">
    <div class="toolbar-content">
      <div class="toolbar-left">
        <h2 id="toolbarClientName">Report</h2>
        <p id="toolbarDate" class="toolbar-meta"></p>
      </div>
      <div class="toolbar-right">
        <span id="toolbarLanguage" class="toolbar-language"></span>
      </div>
    </div>
  </div>

  <div id="reportContainer"></div>

  <div class="report-footer no-print">
    <button class="btn-secondary" onclick="window.print()">Download PDF</button>
    <button class="btn-tertiary" onclick="clearAndReturnHome()">Create Another Report</button>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      generateReport();
    });

    function generateReport() {
      const clientName = sessionStorage.getItem('clientName') || 'Client';
      const language = sessionStorage.getItem('language') || 'en';
      const reportLink = sessionStorage.getItem('reportLink');
      const rawReportText = sessionStorage.getItem('rawReportText');
      const reportDate = new Date().toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });

      document.getElementById('toolbarClientName').textContent = clientName;
      document.getElementById('toolbarDate').textContent = reportDate;

      const langNames = {
        en: 'English',
        es: 'Spanish',
        hu: 'Hungarian',
        ru: 'Russian'
      };
      document.getElementById('toolbarLanguage').textContent = langNames[language] || 'English';

      if (!reportLink && !rawReportText) {
        document.getElementById('reportContainer').innerHTML = '<p>Error: No report data provided. Please go back and submit the form.</p>';
        return;
      }

      document.getElementById('reportContainer').innerHTML = '<div style="padding: 40px; text-align: center;"><p>Processing your bioresonance scan results...</p><div class="spinner" style="margin-top: 20px;"></div></div>';

      // Send to API for data extraction
      fetch('/api/extract-report-data', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          reportLink: reportLink || null,
          rawReportText: rawReportText || null,
          clientName: clientName
        })
      })
      .then(response => response.json())
      .then(data => {
        if (data.error) {
          document.getElementById('reportContainer').innerHTML = `
            <div style="background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 20px; margin: 20px;">
              <p style="color: #d32f2f; font-weight: 600;">${data.error}</p>
              <p style="color: #666; margin-top: 10px; font-size: 14px;">${data.message}</p>
            </div>
          `;
          return;
        }

        // Generate the report HTML from extracted data
        const reportHTML = generateReportHTML(data, language);
        document.getElementById('reportContainer').innerHTML = reportHTML;

        console.log('Generated report with data:', data);
      })
      .catch(error => {
        console.error('Error:', error);
        document.getElementById('reportContainer').innerHTML = `
          <div style="background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 20px; margin: 20px;">
            <p style="color: #d32f2f; font-weight: 600;">Error processing report</p>
            <p style="color: #666; margin-top: 10px; font-size: 14px;">${error.message}</p>
          </div>
        `;
      });
    }

    function generateReportHTML(data, language) {
      const t = getTranslations(language);

      let html = `<div class="wrap" style="max-width: 900px; margin: 0 auto; padding: 40px; background: white;">`;

      // Header
      html += `
        <div class="hdr" style="text-align: center; padding-bottom: 30px; border-bottom: 2px solid #1B4D5C; margin-bottom: 30px;">
          <h1 style="font-size: 32px; color: #1B4D5C; margin-bottom: 12px;">BioScan Wellness Report</h1>
          <h2 style="font-size: 24px; color: #333; margin-bottom: 8px;">${data.clientName}</h2>
          <p style="color: #999; font-size: 14px;">${t.reportDate}: ${data.testDate}</p>
        </div>
      `;

      // Summary Section
      html += `<div class="section" style="margin-bottom: 30px;">`;
      html += `<h3 style="font-size: 18px; color: #1B4D5C; margin-bottom: 16px; font-weight: 600;">${t.overallStatus}</h3>`;

      if (data.generalCondition) {
        html += `<p style="color: #666; margin-bottom: 12px;"><strong>${t.generalCondition}:</strong> ${data.generalCondition}</p>`;
      }

      if (data.biologicalAge) {
        html += `<p style="color: #666; margin-bottom: 12px;"><strong>${t.biologicalAge}:</strong> ${data.biologicalAge} ${t.yearsOld}</p>`;
      }

      if (data.age) {
        html += `<p style="color: #666; margin-bottom: 12px;"><strong>${t.chronologicalAge}:</strong> ${data.age} ${t.yearsOld}</p>`;
      }

      if (data.sex) {
        html += `<p style="color: #666; margin-bottom: 12px;"><strong>${t.sex}:</strong> ${data.sex}</p>`;
      }

      html += `</div>`;

      // Organs Section
      if (Object.keys(data.organs).length > 0) {
        html += `<div class="section" style="margin-bottom: 30px;">`;
        html += `<h3 style="font-size: 18px; color: #1B4D5C; margin-bottom: 16px; font-weight: 600;">${t.organDashboard}</h3>`;
        html += `<p style="color: #666; font-size: 13px; margin-bottom: 16px;">${t.organExplanation}</p>`;
        html += `<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">`;

        Object.entries(data.organs).forEach(([organ, value]) => {
          if (value === null || value === undefined) return;
          const organName = capitalizeWord(organ);
          const status = getHealthStatus(value, language);
          html += `
            <div style="background: #f5f5f5; padding: 16px; border-radius: 8px; border-left: 4px solid #1B4D5C;">
              <p style="color: #333; font-weight: 600; margin-bottom: 4px;">${organName}</p>
              <p style="color: #666; font-size: 14px;">Score: ${value.toFixed(1)}</p>
              <p style="color: #999; font-size: 12px; margin-top: 6px;">${status}</p>
            </div>
          `;
        });

        html += `</div></div>`;
      }

      // Vitamins & Minerals Section
      if (Object.keys(data.vitamins).length > 0 || Object.keys(data.minerals).length > 0) {
        html += `<div class="section" style="margin-bottom: 30px;">`;
        html += `<h3 style="font-size: 18px; color: #1B4D5C; margin-bottom: 16px; font-weight: 600;">${t.vitaminsAndMinerals}</h3>`;
        html += `<p style="color: #666; font-size: 13px; margin-bottom: 16px;">${t.vitaminExplanation}</p>`;

        if (Object.keys(data.vitamins).length > 0) {
          html += `<p style="color: #333; font-weight: 600; margin-bottom: 8px;">${t.vitamins}:</p>`;
          html += `<ul style="margin-left: 20px; color: #666; margin-bottom: 16px;">`;
          Object.entries(data.vitamins).forEach(([vitamin, value]) => {
            if (value !== null && value !== undefined) {
              html += `<li style="margin-bottom: 4px;">${capitalizeWord(vitamin)}: ${value.toFixed(1)}</li>`;
            }
          });
          html += `</ul>`;
        }

        if (Object.keys(data.minerals).length > 0) {
          html += `<p style="color: #333; font-weight: 600; margin-bottom: 8px;">${t.minerals}:</p>`;
          html += `<ul style="margin-left: 20px; color: #666;">`;
          Object.entries(data.minerals).forEach(([mineral, value]) => {
            if (value !== null && value !== undefined) {
              html += `<li style="margin-bottom: 4px;">${capitalizeWord(mineral)}: ${value.toFixed(1)}</li>`;
            }
          });
          html += `</ul>`;
        }

        html += `</div>`;
      }

      // Amino Acids Section
      if (Object.keys(data.aminoAcids).length > 0) {
        html += `<div class="section" style="margin-bottom: 30px;">`;
        html += `<h3 style="font-size: 18px; color: #1B4D5C; margin-bottom: 16px; font-weight: 600;">${t.aminoAcids}</h3>`;
        html += `<p style="color: #666; font-size: 13px; margin-bottom: 16px;">${t.aminoAcidExplanation}</p>`;
        html += `<ul style="margin-left: 20px; color: #666;">`;
        Object.entries(data.aminoAcids).forEach(([acid, value]) => {
          if (value !== null && value !== undefined) {
            html += `<li style="margin-bottom: 6px;"><strong>${capitalizeWord(acid)}:</strong> ${value.toFixed(1)}</li>`;
          }
        });
        html += `</ul>`;
        html += `</div>`;
      }

      // Heavy Metals Section
      if (Object.keys(data.heavyMetals).length > 0) {
        html += `<div class="section" style="margin-bottom: 30px; background: #fff5f5; padding: 20px; border-radius: 8px;">`;
        html += `<h3 style="font-size: 18px; color: #1B4D5C; margin-bottom: 16px; font-weight: 600;">${t.heavyMetals}</h3>`;
        html += `<p style="color: #666; font-size: 13px; margin-bottom: 16px;">${t.heavyMetalExplanation}</p>`;
        html += `<ul style="margin-left: 20px; color: #666;">`;
        Object.entries(data.heavyMetals).forEach(([metal, value]) => {
          if (value !== null && value !== undefined) {
            html += `<li style="margin-bottom: 6px;"><strong>${capitalizeWord(metal)}:</strong> ${value.toFixed(1)}</li>`;
          }
        });
        html += `</ul>`;
        html += `</div>`;
      }

      // Food Sensitivities Section
      if (data.foodSensitivities && data.foodSensitivities.length > 0) {
        html += `<div class="section" style="margin-bottom: 30px;">`;
        html += `<h3 style="font-size: 18px; color: #1B4D5C; margin-bottom: 16px; font-weight: 600;">${t.foodSensitivities}</h3>`;
        html += `<p style="color: #666; font-size: 13px; margin-bottom: 16px;">${t.foodSensitivityExplanation}</p>`;
        html += `<div style="display: flex; flex-wrap: wrap; gap: 10px;">`;
        data.foodSensitivities.forEach(food => {
          html += `<span style="background: #ffd4d4; color: #d32f2f; padding: 8px 12px; border-radius: 6px; font-size: 13px; font-weight: 500;">${food}</span>`;
        });
        html += `</div></div>`;
      }

      // Recommendations Section
      if (data.recommendations && data.recommendations.length > 0) {
        html += `<div class="section" style="margin-bottom: 30px; background: #f0f5f7; padding: 20px; border-radius: 8px;">`;
        html += `<h3 style="font-size: 18px; color: #1B4D5C; margin-bottom: 16px; font-weight: 600;">${t.recommendations}</h3>`;
        html += `<ul style="margin-left: 20px; color: #666;">`;
        data.recommendations.forEach(rec => {
          html += `<li style="margin-bottom: 10px; line-height: 1.6;">${rec}</li>`;
        });
        html += `</ul></div>`;
      }

      // Disclaimer
      html += `
        <div style="background: #f5f5f5; padding: 20px; border-radius: 8px; margin-top: 40px; border-top: 2px solid #ddd; padding-top: 20px;">
          <p style="font-size: 12px; color: #999; line-height: 1.8;">
            <strong>${t.disclaimer}</strong> ${t.disclaimerText}
          </p>
        </div>
      `;

      html += `</div>`;

      return html;
    }

      };

      return translations[language] || translations['en'];
    }

    function capitalizeWord(word) {
      return word.charAt(0).toUpperCase() + word.slice(1);
    }

    function getHealthStatus(value, language) {
      const statuses = {
        en: { excellent: 'Excellent', good: 'Good', fair: 'Fair', poor: 'Poor' },
        es: { excellent: 'Excelente', good: 'Bueno', fair: 'Aceptable', poor: 'Deficiente' },
        hu: { excellent: 'Kiváló', good: 'Jó', fair: 'Elfogadható', poor: 'Gyenge' },
        ru: { excellent: 'Отличное', good: 'Хорошее', fair: 'Справедливое', poor: 'Плохое' }
      };

      const s = statuses[language] || statuses['en'];
      if (value > 80) return s.excellent;
      if (value > 60) return s.good;
      if (value > 40) return s.fair;
      return s.poor;
    }

    function clearAndReturnHome() {
      sessionStorage.clear();
      window.location.href = '/';
    }
  </script>
</body>
</html>
